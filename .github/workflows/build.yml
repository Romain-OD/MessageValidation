name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore MessageValidation.slnx

      - name: Build
        run: dotnet build MessageValidation.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MessageValidation.slnx --configuration Release --no-build --verbosity normal

      - name: Pack (validate packages)
        run: |
          dotnet pack MessageValidation/MessageValidation.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.FluentValidation/MessageValidation.FluentValidation.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.DataAnnotations/MessageValidation.DataAnnotations.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.MqttNet/MessageValidation.MqttNet.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.RabbitMQ/MessageValidation.RabbitMQ.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.Kafka/MessageValidation.Kafka.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.AzureServiceBus/MessageValidation.AzureServiceBus.csproj --configuration Release --no-build --output ./nupkgs
          dotnet pack MessageValidation.AzureEventHubs/MessageValidation.AzureEventHubs.csproj --configuration Release --no-build --output ./nupkgs

